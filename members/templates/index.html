<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Members</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #e7e7e7;
        background: #27292f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, #3a3e49 0%, #202224 65%);
      }

      .container {
        width: min(100%, 420px);
        background: rgba(36, 39, 47, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        padding: 32px 28px;
      }

      .header {
        text-align: center;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.9rem;
        letter-spacing: 0.02em;
      }

      p.description {
        margin: 0;
        color: #b5b9c4;
        line-height: 1.6;
      }

      .member-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      .member-item {
        background: #2e323c;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 16px 18px;
        border-radius: 16px;
        transition:
          transform 0.2s ease,
          background-color 0.2s ease;
      }

      .member-item:hover {
        background: #383f4b;
        transform: translateX(4px);
      }

      .empty-state {
        text-align: center;
        color: #9fa3b1;
        padding: 18px 14px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 14px;
        border: 1px dashed rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body>
    <main class="container" aria-labelledby="members-title">
      <section class="header">
        <h1 id="members-title">Members</h1>
        <p class="description">Hello Hello Hello</p>
      </section>

      {% if mymembers %}
      <ul class="member-list" aria-label="Member list">
        {% for x in mymembers %}
        <li class="member-item">{{ x.firstname }} {{ x.lastname }}</li>
        {% endfor %}
      </ul>
      {% else %}
      <div class="empty-state">No members are available right now.</div>
      {% endif %}
    </main>
  </body>
</html>
