<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>404 - Page Not Found</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #f1f1f1 0%, #8b8b8b 65%);
        color: #777777;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      .container {
        max-width: 500px;
      }

      h1 {
        font-size: 80px;
        margin: 0;
      }

      h2 {
        margin: 10px 0;
        font-weight: normal;
      }

      p {
        margin: 20px 0;
        color: #232323;
      }

      a {
        display: inline-block;
        padding: 10px 20px;
        background: #ededed;
        color: #494949;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        transition: 0.3s;
      }

      a:hover {
        background: #818181;
        color: #e5e5e5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Oops! Page not found</h2>
      <p>
        The page you’re looking for doesn’t exist or may have been moved. Sorry
        :P
      </p>
      <a href="/">Go Home</a>
    </div>
  </body>
</html>
